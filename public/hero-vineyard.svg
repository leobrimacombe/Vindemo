  <path d="M0,520 C 280,486 600,512 900,496 C 1180,482 1420,512 1600,500 L1600,640 L0,640 Z" fill="url(#h2)" opacity="0.95"/>
  <path d="M0,575 C 320,536 700,566 1010,548 C 1280,532 1470,560 1600,552 L1600,720 L0,720 Z" fill="url(#h3)"/>

