    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ead4"/>
      <stop offset="42%" stop-color="#eccf9f"/>
      <stop offset="72%" stop-color="#dcab6c"/>
      <stop offset="100%" stop-color="#cf9856"/>
    </linearGradient>
    <radialGradient id="sun" cx="55%" cy="52%" r="38%">
      <stop offset="0%" stop-color="#fff4dc"/>
      <stop offset="35%" stop-color="#ffe4b0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffe4b0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c69a63"/><stop offset="100%" stop-color="#b07f49"/>
    </linearGradient>
    <linearGradient id="h2" x1="0" y1="0" x2="0" y2="1">
