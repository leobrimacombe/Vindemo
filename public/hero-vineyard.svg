      <stop offset="0%" stop-color="#6f4528"/><stop offset="100%" stop-color="#583620"/>
    </linearGradient>
    <linearGradient id="hf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3621"/><stop offset="100%" stop-color="#43271a"/>
    </linearGradient>
    <clipPath id="frontHill">
      <path d="M0,640 C 360,560 720,600 1010,560 C 1280,524 1460,560 1600,548 L1600,900 L0,900 Z"/>
    </clipPath>
  </defs>

  <!-- Ciel + soleil -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>
  <circle cx="880" cy="455" r="78" fill="#fff6e3"/>

